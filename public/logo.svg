<svg width="200" height="50" viewBox="0 0 200 50" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Graduation Cap Icon -->
  <g transform="translate(5, 10)">
    <!-- Cap base -->
    <path d="M15 12L5 8L15 4L25 8L15 12Z" fill="#F2A900"/>
    <path d="M15 12L5 8L15 4L25 8L15 12Z" stroke="#1C3664" stroke-width="1.5" stroke-linejoin="round"/>
    
    <!-- Cap top -->
    <rect x="12" y="2" width="6" height="2" rx="0.5" fill="#1C3664"/>
    
    <!-- Left side -->
    <path d="M7 9V15C7 16.5 10 18 15 18C20 18 23 16.5 23 15V9" stroke="#1C3664" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Tassel -->
    <line x1="15" y1="2" x2="15" y2="0" stroke="#F2A900" stroke-width="1"/>
    <circle cx="15" cy="0" r="1" fill="#F2A900"/>
  </g>
  
  <!-- Text: Scholar -->
  <text x="45" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#1C3664" letter-spacing="-0.5">Scholar</text>
  
  <!-- Text: Arena (with gold color) -->
  <text x="130" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#F2A900" letter-spacing="-0.5">Arena</text>
</svg>
